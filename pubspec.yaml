name: fhirant
description: Fast Healthcare Interoperability Resources Agile Networking Tool
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dart_frog: ^1.2.0
  fhir_r4:
    path: ../fhir_r4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  path: ^1.9.0
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - mimic-fhir/
