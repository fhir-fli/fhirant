name: fhirant
description: Fast Healthcare Interoperability Resources Agile Networking Tool
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  basic_utils: ^5.7.0
  dart_jsonwebtoken: ^2.15.0
  drift: ^2.24.0
  fhir_r4:
    path: ../fhir_r4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_passkey:
    path: ../flutter_passkey
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  http: ^1.3.0
  intl: ^0.19.0
  json_view: ^0.4.2
  logging: ^1.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  shelf: ^1.4.2
  shelf_rate_limiter: ^1.0.1
  shelf_router: ^1.1.4
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.7.2

dependency_overrides:
  collection: ^1.19.0

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.24.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/fhir_spec/
    - assets/mimic/
